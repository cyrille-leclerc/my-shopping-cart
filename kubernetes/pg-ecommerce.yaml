---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
data:
  init.sql: |
    -- Create extension in the current database (ecommerce)
    CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
    
    -- Also create extension in postgres database
    \c postgres
    CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
---
apiVersion: v1
kind: Service
metadata:
  name: pg-ecommerce
spec:
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: pg-ecommerce
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pg-ecommerce
  template:
    metadata:
      annotations:
        io.opentelemetry.discovery.metrics/enabled: 'true'
        io.opentelemetry.discovery.metrics/scraper: postgresql
        io.opentelemetry.discovery.metrics/config: |
          username: ecommerce
          password: ecommerce
          metrics:
            postgresql.blks_hit:
              enabled: true
            postgresql.blks_read:
              enabled: true
            postgresql.tup_fetched:
              enabled: true
            postgresql.tup_returned:
              enabled: true
            postgresql.tup_inserted:
              enabled: true
            postgresql.tup_updated:
              enabled: true
            postgresql.tup_deleted:
              enabled: true
            postgresql.deadlocks:
              enabled: true
          tls:
            insecure: true
      labels:
        app.kubernetes.io/name: pg-ecommerce
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          args: ["-c", "shared_preload_libraries=pg_stat_statements"]
          env:
            - name: POSTGRES_PASSWORD
              value: ecommerce
            - name: POSTGRES_USER
              value: ecommerce
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init
      restartPolicy: Always
