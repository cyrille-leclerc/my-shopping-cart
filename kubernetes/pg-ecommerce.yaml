---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
data:
  init.sql: |
    -- Enable pg_stat_statements in the default postgres database
    CREATE EXTENSION IF NOT EXISTS pg_stat_statements;

    -- Create ecommerce_db database
    CREATE DATABASE ecommerce_db;

    -- Create ecommerce_user with access to the ecommerce_db database
    CREATE USER ecommerce_user WITH PASSWORD 'ecommerce_password';
    GRANT ALL PRIVILEGES ON DATABASE ecommerce_db TO ecommerce_user;

    -- Create monitoring_user with pg_monitor role, with access to both databases
    CREATE USER monitoring_user WITH PASSWORD 'monitoring_password';
    GRANT pg_monitor TO monitoring_user;
    GRANT CONNECT ON DATABASE postgres TO monitoring_user;
    GRANT CONNECT ON DATABASE ecommerce_db TO monitoring_user;

    -- Set up ecommerce_db database
    \c ecommerce_db
    CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
    GRANT ALL ON SCHEMA public TO ecommerce_user;
---
apiVersion: v1
kind: Service
metadata:
  name: pg-ecommerce
spec:
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: pg-ecommerce
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pg-ecommerce
  template:
    metadata:
      annotations:
        io.opentelemetry.discovery.logs/enabled: 'true'
        io.opentelemetry.discovery.metrics/enabled: 'true'
        io.opentelemetry.discovery.metrics/scraper: postgresql
        io.opentelemetry.discovery.metrics/config: |
          username: monitoring_user
          password: monitoring_password
          metrics:
            postgresql.blks_hit:
              enabled: true
            postgresql.blks_read:
              enabled: true
            postgresql.tup_fetched:
              enabled: true
            postgresql.tup_returned:
              enabled: true
            postgresql.tup_inserted:
              enabled: true
            postgresql.tup_updated:
              enabled: true
            postgresql.tup_deleted:
              enabled: true
            postgresql.deadlocks:
              enabled: true
          tls:
            insecure: true
      labels:
        app.kubernetes.io/name: pg-ecommerce
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          args: ["-c", "shared_preload_libraries=pg_stat_statements"]
          env:
            - name: POSTGRES_PASSWORD
              value: change_it
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init
      restartPolicy: Always
