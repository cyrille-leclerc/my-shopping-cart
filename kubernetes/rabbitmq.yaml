---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  ports:
    - name: rabbitmq
      port: 5672
      targetPort: 5672
      protocol: TCP
    - name: rabbitmq-management
      port: 15672
      targetPort: 15672
      protocol: TCP
  selector:
    app.kubernetes.io/name: rabbitmq
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
  template:
    metadata:
      annotations:
        io.opentelemetry.discovery.logs/enabled: 'false'
        io.opentelemetry.discovery.metrics/enabled: 'false'
        io.opentelemetry.discovery.metrics/scraper: rabbitmq
        io.opentelemetry.discovery.metrics/config: |
          endpoint: http://`endpoint`:15672 #:15672
          username: guest
          password: guest
      labels:
        app.kubernetes.io/name: rabbitmq
    spec:
      containers:
        - image: rabbitmq:4-management-alpine
          name: rabbitmq
          ports:
            - containerPort: 5672
              protocol: TCP
            - containerPort: 15672
              protocol: TCP
            - containerPort: 15692
              protocol: TCP
      restartPolicy: Always
