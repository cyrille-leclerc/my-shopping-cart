---
# Source: opentelemetry-kube-stack/templates/collector.yaml
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: opentelemetry-stack-daemon
  namespace: opentelemetry-operator-system
  labels:
    helm.sh/chart: opentelemetry-kube-stack-0.18.1
    app.kubernetes.io/version: "0.153.0"
    app.kubernetes.io/managed-by: Helm
    release: "opentelemetry-stack"        
spec:
  managementState: managed
  mode: daemonset
  config:
    connectors:
      datadog/connector:
        traces:
          compute_stats_by_span_kind: true
    exporters:
      datadog:
        api:
          key: ${env:DD_API_KEY}
          site: ${env:DD_SITE:-datadoghq.com}
        orchestrator_explorer:
          enabled: true
        sending_queue:
          batch:
            flush_timeout: 10s
            max_size: 100
            min_size: 10
        traces:
          compute_stats_by_span_kind: true
          trace_buffer: 500
      debug:
        verbosity: detailed
    extensions:
      datadog/extension:
        api:
          key: ${env:DD_API_KEY}
          site: ${env:DD_SITE:-datadoghq.com}
        deployment_type: daemonset
        http:
          endpoint: localhost:9875
          path: /metadata
      k8s_leader_elector/k8s_cluster:
        auth_type: serviceAccount
        lease_name: k8s.cluster.receiver.opentelemetry.io
        lease_namespace: opentelemetry-operator-system
      k8s_leader_elector/k8s_objects:
        auth_type: serviceAccount
        lease_name: k8s.objects.receiver.opentelemetry.io
        lease_namespace: opentelemetry-operator-system
      k8s_observer:
        auth_type: serviceAccount
        node: ${env:K8S_NODE_NAME}
    processors:
      batch:
        send_batch_max_size: 1500
        send_batch_size: 1000
        timeout: 1s
      cumulativetodelta: {}
      k8sattributes:
        extract:
          labels:
          - from: pod
            key: app.kubernetes.io/instance
            tag_name: k8s.app.instance
          - from: pod
            key: app.kubernetes.io/component
            tag_name: k8s.app.component
          metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.node.name
          - k8s.pod.start_time
          - k8s.deployment.name
          - k8s.replicaset.name
          - k8s.replicaset.uid
          - k8s.daemonset.name
          - k8s.daemonset.uid
          - k8s.job.name
          - k8s.job.uid
          - k8s.container.name
          - k8s.cronjob.name
          - k8s.statefulset.name
          - k8s.statefulset.uid
          - container.image.tag
          - container.image.name
          - k8s.cluster.uid
          - service.namespace
          - service.name
          - service.version
          - service.instance.id
          otel_annotations: true
        filter:
          node_from_env_var: OTEL_K8S_NODE_NAME
        passthrough: false
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: resource_attribute
            name: k8s.pod.name
          - from: resource_attribute
            name: k8s.namespace.name
          - from: resource_attribute
            name: k8s.node.name
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: k8s.pod.name
          - from: resource_attribute
            name: k8s.namespace.name
        - sources:
          - from: connection
      resource/fake_k8s_cluster_uid:
        attributes:
        - action: insert
          key: k8s.cluster.uid
          value: 218fc5a9-a5f1-4b54-aa05-46717d0ab26d
      resource/hostname:
        attributes:
        - action: insert
          from_attribute: k8s.node.name
          key: host.name
      resourcedetection/env:
        detectors:
        - env
        - k8snode
        override: false
        timeout: 2s
    receivers:
      hostmetrics:
        collection_interval: 10s
        root_path: /hostfs
        scrapers:
          cpu:
            metrics:
              system.cpu.logical.count:
                enabled: true
              system.cpu.utilization:
                enabled: true
          disk: {}
          filesystem:
            exclude_fs_types:
              fs_types:
              - autofs
              - binfmt_misc
              - bpf
              - cgroup2
              - configfs
              - debugfs
              - devpts
              - devtmpfs
              - fusectl
              - hugetlbfs
              - iso9660
              - mqueue
              - nsfs
              - overlay
              - proc
              - procfs
              - pstore
              - rpc_pipefs
              - securityfs
              - selinuxfs
              - squashfs
              - sysfs
              - tracefs
              match_type: strict
            exclude_mount_points:
              match_type: regexp
              mount_points:
              - /dev/*
              - /proc/*
              - /sys/*
              - /run/k3s/containerd/*
              - /var/lib/docker/*
              - /var/lib/kubelet/*
              - /snap/*
            metrics:
              system.filesystem.utilization:
                enabled: true
          load: {}
          memory:
            metrics:
              system.memory.limit:
                enabled: true
              system.memory.utilization:
                enabled: true
          network: {}
          paging:
            metrics:
              system.paging.usage:
                enabled: true
          system:
            metrics:
              system.uptime:
                enabled: true
      k8s_cluster:
        allocatable_types_to_report:
        - cpu
        - memory
        - storage
        auth_type: serviceAccount
        collection_interval: 10s
        k8s_leader_elector: k8s_leader_elector/k8s_cluster
        node_conditions_to_report:
        - Ready
        - MemoryPressure
        - DiskPressure
        - NetworkUnavailable
      k8sobjects:
        interval: 3m
        k8s_leader_elector: k8s_leader_elector/k8s_objects
        objects:
        - mode: pull
          name: namespaces
        - mode: pull
          name: pods
        - mode: pull
          name: nodes
        - mode: pull
          name: services
        - mode: pull
          name: serviceaccounts
        - group: apps
          mode: pull
          name: deployments
        - group: apps
          mode: pull
          name: replicasets
        - group: apps
          mode: pull
          name: daemonsets
        - group: apps
          mode: pull
          name: statefulsets
        - group: batch
          mode: pull
          name: jobs
        - group: batch
          mode: pull
          name: cronjobs
        - group: rbac.authorization.k8s.io
          mode: pull
          name: roles
        - group: rbac.authorization.k8s.io
          mode: pull
          name: rolebindings
        - group: rbac.authorization.k8s.io
          mode: pull
          name: clusterroles
        - group: rbac.authorization.k8s.io
          mode: pull
          name: clusterrolebindings
        - group: storage.k8s.io
          mode: pull
          name: storageclasses
        - mode: pull
          name: persistentvolumes
        - mode: pull
          name: persistentvolumeclaims
        - group: networking.k8s.io
          mode: pull
          name: ingresses
        - group: networking.k8s.io
          mode: pull
          name: networkpolicies
        - group: autoscaling
          mode: pull
          name: horizontalpodautoscalers
        - group: policy
          mode: pull
          name: poddisruptionbudgets
        - group: apiextensions.k8s.io
          mode: pull
          name: customresourcedefinitions
      kubeletstats:
        auth_type: serviceAccount
        collection_interval: 15s
        endpoint: https://${env:OTEL_K8S_NODE_IP}:10250
        extra_metadata_labels:
        - container.id
        - k8s.volume.type
        insecure_skip_verify: true
        k8s_api_config:
          auth_type: serviceAccount
        metric_groups:
        - node
        - pod
        - volume
        - container
        metrics:
          container.cpu.usage:
            enabled: true
          k8s.node.cpu.usage:
            enabled: true
          k8s.node.uptime:
            enabled: true
          k8s.pod.cpu.usage:
            enabled: true
          k8s.pod.uptime:
            enabled: true
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus/cadvisor:
        config:
          scrape_configs:
          - authorization:
              credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              type: Bearer
            job_name: kubelet
            metric_relabel_configs:
            - action: drop
              regex: container_cpu_(load_average_10s|system_seconds_total|user_seconds_total)
              source_labels:
              - __name__
            - action: drop
              regex: container_fs_(io_current|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)
              source_labels:
              - __name__
            - action: drop
              regex: container_memory_(mapped_file|swap)
              source_labels:
              - __name__
            - action: drop
              regex: container_(file_descriptors|tasks_state|threads_max)
              source_labels:
              - __name__
            - action: drop
              regex: container_spec.*
              source_labels:
              - __name__
            - action: drop
              regex: .+;
              source_labels:
              - id
              - pod
            metrics_path: /metrics/cadvisor
            relabel_configs:
            - replacement: ${env:OTEL_K8S_NODE_NAME}
              target_label: node
            scheme: https
            scrape_interval: 30s
            scrape_timeout: 10s
            static_configs:
            - targets:
              - ${env:OTEL_K8S_NODE_IP}:10250
            tls_config:
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecure_skip_verify: true
      prometheus/pod_annotations:
        config:
          scrape_configs:
          - job_name: kubernetes-pods
            kubernetes_sd_configs:
            - role: pod
              selectors:
              - field: spec.nodeName=${env:OTEL_K8S_NODE_NAME}
                label: app.kubernetes.io/component!=opentelemetry-collector
                role: pod
            relabel_configs:
            - action: keep
              regex: true
              source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_scrape
            - action: drop
              regex: true
              source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_scrape_slow
            - action: replace
              regex: (https?)
              source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_scheme
              target_label: __scheme__
            - action: replace
              regex: (.+)
              source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_path
              target_label: __metrics_path__
            - action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $$1:$$2
              source_labels:
              - __address__
              - __meta_kubernetes_pod_annotation_prometheus_io_port
              target_label: __address__
            - action: labelmap
              regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)
              replacement: __param_$$1
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - action: replace
              source_labels:
              - __meta_kubernetes_namespace
              target_label: namespace
            - action: replace
              source_labels:
              - __meta_kubernetes_pod_name
              target_label: pod
            - action: replace
              source_labels:
              - __meta_kubernetes_pod_node_name
              target_label: node
            - action: drop
              regex: Pending|Succeeded|Failed|Completed
              source_labels:
              - __meta_kubernetes_pod_phase
            - action: replace
              source_labels:
              - __meta_kubernetes_pod_label_app_kubernetes_io_name
              target_label: job
            scrape_interval: 30s
            scrape_timeout: 10s
      receiver_creator/metrics:
        discovery:
          enabled: true
        watch_observers:
        - k8s_observer
    service:
      extensions:
      - datadog/extension
      - k8s_observer
      - k8s_leader_elector/k8s_objects
      - k8s_leader_elector/k8s_cluster
      pipelines:
        logs:
          exporters:
          - datadog
          processors:
          - k8sattributes
          - resource/fake_k8s_cluster_uid
          - resourcedetection/env
          - resource/hostname
          - batch
          receivers:
          - otlp
          - k8sobjects
        metrics:
          exporters:
          - datadog
          processors:
          - cumulativetodelta
          - k8sattributes
          - resourcedetection/env
          - resource/hostname
          - batch
          receivers:
          - otlp
          - receiver_creator/metrics
          - hostmetrics
          - kubeletstats
          - prometheus/cadvisor
          - prometheus/pod_annotations
          - k8s_cluster
        metrics/datadog_direct:
          exporters:
          - datadog
          receivers:
          - datadog/connector
        traces:
          exporters:
          - datadog
          - datadog/connector
          processors:
          - k8sattributes
          - resourcedetection/env
          - resource/hostname
          - batch
          receivers:
          - otlp
      telemetry:
        logs:
          processors:
          - batch:
              exporter:
                otlp:
                  endpoint: https://otlp.${env:DD_SITE:-datadoghq.com}/v1/logs
                  headers:
                  - name: dd-api-key
                    value: ${DD_API_KEY}
                  protocol: http/protobuf
        metrics:
          readers:
          - periodic:
              exporter:
                otlp:
                  endpoint: https://otlp.${env:DD_SITE:-datadoghq.com}/api/v2/otlpmetrics
                  headers:
                  - name: dd-api-key
                    value: ${DD_API_KEY}
                  - name: dd-otel-metric-config
                    value: '{"resource_attributes_as_tags": true, "instrumentation_scope_metadata_as_tags":
                      true}'
                  protocol: http/protobuf
                  temporality_preference: delta
        resource:
          deployment.environment.name: staging
          k8s.cluster.name: my_testing_k8s_cluster
  imagePullPolicy: IfNotPresent
  upgradeStrategy: automatic
  terminationGracePeriodSeconds: 30
  resources:
    limits:
      cpu: 200m
      memory: 500Mi
    requests:
      cpu: 100m
      memory: 250Mi
  securityContext:
    {}
  volumeMounts:
  - name: hostfs
    mountPath: /hostfs
    readOnly: true
    mountPropagation: HostToContainer
  env:
  - name: K8S_NODE_NAME 
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: OTEL_K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: OTEL_K8S_NODE_IP
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  - name: OTEL_K8S_NAMESPACE
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: metadata.namespace
  - name: OTEL_K8S_POD_NAME
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: metadata.name
  - name: OTEL_K8S_POD_IP
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: status.podIP
  - name: OTEL_RESOURCE_ATTRIBUTES
    value: "k8s.pod.name=$(OTEL_K8S_POD_NAME),k8s.namespace.name=$(OTEL_K8S_NAMESPACE),k8s.node.name=$(OTEL_K8S_NODE_NAME),host.name=$(OTEL_K8S_NODE_NAME),k8s.node.ip=$(OTEL_K8S_NODE_IP),k8s.pod.ip=$(OTEL_K8S_POD_IP),k8s.cluster.name=my_testing_k8s_cluster"
  
  - name: DD_API_KEY
    valueFrom:
      secretKeyRef:
        key: DD_API_KEY
        name: dd-secrets
  - name: DD_SITE
    valueFrom:
      secretKeyRef:
        key: DD_SITE
        name: dd-secrets
        optional: true
  volumes:
  - name: hostfs
    hostPath:
      path: /
